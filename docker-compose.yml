services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      DATABASE_URL: postgres://nhs:nhs@db:5432/nhs_scraper
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nhs
      POSTGRES_PASSWORD: nhs
      POSTGRES_DB: nhs_scraper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nhs -d nhs_scraper"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
